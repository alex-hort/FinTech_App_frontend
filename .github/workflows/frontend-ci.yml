name: Frontend CI
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Configurar Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - name: Instalar dependencias
        run: npm ci
      - name: Ejecutar pruebas
        run: npm test -- --watchAll=false
      - name: Compilar
        run: npm run build

        